<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- Background gradient (light mode) -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F0EBE2"/>
      <stop offset="100%" stop-color="#E4DDD2"/>
    </linearGradient>
    <!-- Face gradient -->
    <linearGradient id="face" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#A4B890"/>
      <stop offset="100%" stop-color="#839B70"/>
    </linearGradient>
    <!-- Leaf gradients -->
    <linearGradient id="leaf-l" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8B9B7A"/>
      <stop offset="100%" stop-color="#7A8B6B"/>
    </linearGradient>
    <linearGradient id="leaf-r" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7A8B6B"/>
      <stop offset="100%" stop-color="#6B7A5A"/>
    </linearGradient>
    <!-- Shine — soft natural lighting from upper-left -->
    <radialGradient id="shine" cx="0.38" cy="0.28" r="0.5">
      <stop offset="0%" stop-color="rgba(255,255,255,0.22)"/>
      <stop offset="40%" stop-color="rgba(255,255,255,0.08)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
    <!-- Eye shine -->
    <radialGradient id="eye-shine" cx="0.3" cy="0.25" r="0.4">
      <stop offset="0%" stop-color="rgba(255,255,255,0.5)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" fill="url(#bg)" rx="0" ry="0"/>

  <!-- Face circle -->
  <circle cx="512" cy="540" r="310" fill="url(#face)"/>

  <!-- Face shine — large soft wash across upper face -->
  <ellipse cx="470" cy="440" rx="220" ry="180" fill="url(#shine)"/>

  <!-- Sprout stem -->
  <rect x="506" y="140" width="12" height="110" rx="6" fill="#6B7A5A"/>

  <!-- Sprout left leaf -->
  <ellipse cx="485" cy="138" rx="42" ry="32" fill="url(#leaf-l)" transform="rotate(-20, 485, 138)"/>

  <!-- Sprout right leaf -->
  <ellipse cx="539" cy="138" rx="42" ry="32" fill="url(#leaf-r)" transform="rotate(20, 539, 138)"/>

  <!-- Left eye -->
  <circle cx="412" cy="500" r="36" fill="#2A3020"/>
  <circle cx="402" cy="490" r="13" fill="rgba(255,255,255,0.45)"/>

  <!-- Right eye -->
  <circle cx="612" cy="500" r="36" fill="#2A3020"/>
  <circle cx="602" cy="490" r="13" fill="rgba(255,255,255,0.45)"/>

  <!-- Smile — gentle natural curve, thicker stroke -->
  <path d="M 448 620 Q 512 680, 576 620" stroke="#2A3020" stroke-width="14" fill="none" stroke-linecap="round"/>

  <!-- Left cheek -->
  <ellipse cx="380" cy="575" rx="38" ry="22" fill="rgba(196,150,130,0.2)"/>

  <!-- Right cheek -->
  <ellipse cx="644" cy="575" rx="38" ry="22" fill="rgba(196,150,130,0.2)"/>
</svg>

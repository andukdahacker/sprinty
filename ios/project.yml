name: sprinty
options:
  bundleIdPrefix: com.ducdo
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "26.3"
  createIntermediateGroups: true
  defaultConfig: Debug

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete

configs:
  Debug: debug
  Staging: release
  Release: release

configFiles:
  Debug: sprinty/Configuration/Debug.xcconfig
  Staging: sprinty/Configuration/Staging.xcconfig
  Release: sprinty/Configuration/Release.xcconfig

packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift.git
    from: "7.10.0"
  SQLiteVecKit:
    path: Packages/SQLiteVecKit

targets:
  sprinty:
    type: application
    platform: iOS
    sources:
      - path: sprinty
        excludes:
          - "**/*.xcconfig"
    resources:
      - path: sprinty/Resources/Assets.xcassets
      - path: sprinty/Resources/MiniLM.mlpackage
        optional: true
      - path: sprinty/Resources/vocab.txt
        optional: true
    settings:
      base:
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait"
        PRODUCT_BUNDLE_IDENTIFIER: com.ducdo.sprinty
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_ENTITLEMENTS: sprinty/sprinty.entitlements
        COACH_API_URL: "http://localhost:8080"
    dependencies:
      - package: GRDB
        product: GRDB
      - package: SQLiteVecKit
        product: SQLiteVecKit
      - target: sprinty_widgetExtension
        embed:
          codeSign: true

  sprinty_widgetExtension:
    type: app-extension
    platform: iOS
    info:
      path: sprinty_widgetExtension/Info.plist
      properties:
        CFBundleDisplayName: Sprinty Widgets
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    sources:
      - path: sprinty_widgetExtension
      - path: sprinty/Core/Utilities/Constants.swift
      - path: sprinty/Services/Database/DatabaseManager.swift
      - path: sprinty/Services/Database/Migrations.swift
      - path: sprinty/Models/Sprint.swift
      - path: sprinty/Models/SprintStep.swift
      - path: sprinty/Models/UserProfile.swift
      - path: sprinty/Core/State/AvatarState.swift
      - path: sprinty/Core/Utilities/AvatarOptions.swift
      - path: sprinty/Core/Errors/AppError.swift
      - path: sprinty/Models/DomainState.swift
      - path: sprinty/Features/Widgets/WidgetDataProvider.swift
    resources:
      - path: sprinty/Resources/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ducdo.sprinty.widgets
        CODE_SIGN_ENTITLEMENTS: sprinty_widgetExtension/sprinty_widgetExtension.entitlements
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
    dependencies:
      - package: GRDB
        product: GRDB

  sprintyTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ducdo.sprinty-tests
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: sprinty
      - package: GRDB
        product: GRDB
      - package: SQLiteVecKit
        product: SQLiteVecKit

schemes:
  Debug:
    build:
      targets:
        sprinty: all
        sprinty_widgetExtension: all
        sprintyTests: [test]
    run:
      config: Debug
      storeKitConfiguration: Sprinty.storekit
    test:
      config: Debug
      targets:
        - sprintyTests
    profile:
      config: Debug

  Staging:
    build:
      targets:
        sprinty: all
        sprinty_widgetExtension: all
        sprintyTests: [test]
    run:
      config: Staging
    test:
      config: Staging
      targets:
        - sprintyTests
    profile:
      config: Staging

  Release:
    build:
      targets:
        sprinty: all
        sprinty_widgetExtension: all
    run:
      config: Release
    profile:
      config: Release
